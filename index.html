<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriental - Task Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash-container {
            text-align: center;
            color: white;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 32px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 32px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .redirect-text {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">🌄</div>
        <h1>ORIENTAL</h1>
        <p class="tagline">Task Management for Development Teams</p>
        <div class="loading-spinner"></div>
        <p class="redirect-text">Redirecting to dashboard...</p>
    </div>

    <script>
        /**
         * Oriental - Entry Point
         * Checks authentication status and redirects appropriately
         */
        
        // Check if user is logged in via localStorage
        const checkAuthAndRedirect = () => {
            const user = localStorage.getItem('oriental_user');
            
            if (user) {
                // User exists, go to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // No user, go to login
                window.location.href = 'login.html';
            }
        };
        
        // Small delay for splash screen visibility
        setTimeout(checkAuthAndRedirect, 1500);
    </script>

  const app = initializeApp(firebaseConfig);
</script>
</body>
</html>
