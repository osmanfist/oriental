<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Invite - Oriental</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-mountain-sun"></i>
            <h1>oriental</h1>
        </div>
        
        <div id="invite-status" class="auth-form active">
            <div class="loading-spinner"></div>
            <p style="text-align: center; margin-top: 20px;">Processing your invitation...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        let inviteData = null;
        let inviteId = null;
        
        async function processInvite() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            console.log('Processing invite with token:', token);
            
            if (!token) {
                showError('No invitation token provided.');
                return;
            }
            
            try {
                // Find the invite
                const invitesSnapshot = await db.collection('invites')
                    .where('token', '==', token)
                    .where('status', '==', 'pending')
                    .limit(1)
                    .get();
                
                if (invitesSnapshot.empty) {
                    showError('This invitation is invalid or has already been used.');
                    return;
                }
                
                const inviteDoc = invitesSnapshot.docs[0];
                inviteData = inviteDoc.data();
                inviteId = inviteDoc.id;
                
                console.log('Invite found:', inviteData);
                
                // Check expiration
                if (inviteData.expiresAt && inviteData.expiresAt.toDate() < new Date()) {
                    showError('This invitation has expired. Please ask for a new one.');
                    return;
                }
                
                // Check if user is logged in
                const currentUser = auth.currentUser;
                
                if (!currentUser) {
                    // Store invite token and show login/signup options
                    localStorage.setItem('pending_invite_token', token);
                    showLoginOptions();
                    return;
                }
                
                // User is logged in - check if they are the invited person
                await processLoggedInUser(currentUser);
                
            } catch (error) {
                console.error('Error processing invite:', error);
                showError(error.message);
            }
        }
        
        async function processLoggedInUser(user) {
            // Check if this is the invited person
            const isInvitedPerson = user.email === inviteData.email;
            
            if (!isInvitedPerson) {
                // Wrong account - offer to switch
                document.getElementById('invite-status').innerHTML = `
                    <h2>Wrong Account</h2>
                    <p>You are currently logged in as <strong>${escapeHtml(user.email)}</strong>.</p>
                    <p>This invitation was sent to <strong>${escapeHtml(inviteData.email)}</strong>.</p>
                    <div style="margin-top: 24px;">
                        <button onclick="logoutAndRetry()" class="btn btn-primary" style="width: 100%; margin-bottom: 12px;">
                            <i class="fas fa-sign-out-alt"></i> Logout & Continue
                        </button>
                        <a href="login.html" class="btn btn-secondary" style="width: 100%; text-align: center;">
                            Go to Login
                        </a>
                    </div>
                `;
                return;
            }
            
            // Correct user - add to organization
            await addUserToOrganization(user);
        }
        
        async function addUserToOrganization(user) {
            try {
                const userDocRef = db.collection('users').doc(user.uid);
                const userDoc = await userDocRef.get();
                
                let currentOrgs = [];
                
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    currentOrgs = userData.organizations || [];
                }
                
                // Check if already in organization
                if (currentOrgs.includes(inviteData.organizationId)) {
                    document.getElementById('invite-status').innerHTML = `
                        <h2>Already a Member</h2>
                        <p>You are already a member of <strong>${escapeHtml(inviteData.organizationName)}</strong>.</p>
                        <a href="dashboard.html" class="btn btn-primary" style="margin-top: 20px;">Go to Dashboard</a>
                    `;
                    return;
                }
                
                // Add to organizations
                currentOrgs.push(inviteData.organizationId);
                
                if (userDoc.exists) {
                    await userDocRef.update({
                        organizations: currentOrgs,
                        currentOrganization: inviteData.organizationId
                    });
                } else {
                    await userDocRef.set({
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        organizations: currentOrgs,
                        currentOrganization: inviteData.organizationId,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        preferences: {
                            notifications: true,
                            emailDigest: 'daily'
                        }
                    });
                }
                
                // Update invite status
                await db.collection('invites').doc(inviteId).update({
                    status: 'accepted',
                    acceptedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    acceptedBy: user.uid
                });
                
                // Add to organization members
                const orgRef = db.collection('organizations').doc(inviteData.organizationId);
                const orgDoc = await orgRef.get();
                if (orgDoc.exists) {
                    const orgMembers = orgDoc.data().members || [];
                    if (!orgMembers.includes(user.uid)) {
                        await orgRef.update({
                            members: firebase.firestore.FieldValue.arrayUnion(user.uid)
                        });
                    }
                }
                
                document.getElementById('invite-status').innerHTML = `
                    <h2>Welcome to ${escapeHtml(inviteData.organizationName)}! 🎉</h2>
                    <p>You've been added to the team as <strong>${escapeHtml(inviteData.role || 'member')}</strong>.</p>
                    <a href="dashboard.html" class="btn btn-primary" style="margin-top: 20px;">Go to Dashboard</a>
                `;
                
            } catch (error) {
                console.error('Error adding user to organization:', error);
                showError(error.message);
            }
        }
        
        function showLoginOptions() {
            const invitedEmail = inviteData.email;
            
            document.getElementById('invite-status').innerHTML = `
                <h2>Accept Invitation</h2>
                <p>You've been invited to join <strong>${escapeHtml(inviteData.organizationName)}</strong> as a <strong>${escapeHtml(inviteData.role || 'member')}</strong>.</p>
                
                <div style="background: #f0fdf4; border-radius: 12px; padding: 16px; margin: 20px 0;">
                    <p style="margin: 0; color: #166534;">
                        <i class="fas fa-envelope"></i> Invitation sent to: <strong>${escapeHtml(invitedEmail)}</strong>
                    </p>
                </div>
                
                <div style="margin-top: 24px;">
                    <button onclick="redirectToLogin()" class="btn btn-primary" style="width: 100%; margin-bottom: 12px;">
                        <i class="fas fa-sign-in-alt"></i> Log In
                    </button>
                    <button onclick="redirectToSignup()" class="btn btn-secondary" style="width: 100%;">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </div>
            `;
        }
        
        function showError(message) {
            document.getElementById('invite-status').innerHTML = `
                <h2>Invitation Error</h2>
                <p>${escapeHtml(message)}</p>
                <a href="login.html" class="btn btn-primary" style="margin-top: 20px;">Go to Login</a>
            `;
        }
        
        function redirectToLogin() {
            localStorage.setItem('pending_invite_token', new URLSearchParams(window.location.search).get('token'));
            window.location.href = 'login.html';
        }
        
        function redirectToSignup() {
            localStorage.setItem('pending_invite_token', new URLSearchParams(window.location.search).get('token'));
            window.location.href = 'login.html?signup=true';
        }
        
        async function logoutAndRetry() {
            await firebase.auth().signOut();
            localStorage.removeItem('oriental_user');
            // Keep the invite token
            const token = new URLSearchParams(window.location.search).get('token');
            localStorage.setItem('pending_invite_token', token);
            window.location.reload();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Make functions global for button onclick
        window.logoutAndRetry = logoutAndRetry;
        window.redirectToLogin = redirectToLogin;
        window.redirectToSignup = redirectToSignup;
        
        // Run the process
        processInvite();
    </script>
</body>
</html>
