<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriental - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-mountain-sun"></i>
                    <h2>oriental</h2>
                </div>
            </div>
            
            <!-- User Info Section -->
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-details">
                    <span class="user-name" id="user-name">Loading...</span>
                    <span class="user-email" id="user-email">user@example.com</span>
                </div>
                <button class="logout-icon-btn" id="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <div class="org-info" id="org-info">
                <div class="org-name" id="org-name">Loading...</div>
                <div class="org-role" id="org-role">Organization</div>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="board">
                    <i class="fas fa-columns"></i>
                    <span>Board</span>
                </a>
                <a href="#" class="nav-item" data-view="sprints">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Sprints</span>
                </a>
            </nav>
            
            <div class="projects-section">
                <div class="projects-header">
                    <h3>Projects</h3>
                    <button class="add-project-btn" id="add-project-btn" onclick="openProjectModal()">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div class="project-list" id="project-list">
                    <!-- Projects will be loaded here -->
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header">
                <h1 id="current-view">Board</h1>
                <div class="header-actions">
                    <button class="create-task-btn" id="create-task-btn" onclick="openTaskModal()">
                        <i class="fas fa-plus"></i>
                        <span>New Task</span>
                    </button>
                </div>
            </div>
            
            <!-- Board View -->
            <div id="board-view" class="board-view">
                <!-- Columns will be loaded here -->
            </div>
            
            <!-- Sprints View (hidden by default) -->
            <div id="sprints-view" class="sprints-view hidden">
                <div class="sprint-header">
                    <div class="sprint-info">
                        <div>
                            <h3>Active Sprint</h3>
                            <p id="active-sprint-info">No active sprint</p>
                        </div>
                        <button class="create-sprint-btn" id="create-sprint-btn" onclick="openSprintModal()">
                            <i class="fas fa-plus"></i>
                            <span>Start Sprint</span>
                        </button>
                    </div>
                </div>
                <div id="sprint-tasks" class="board-view">
                    <!-- Sprint tasks will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Task Modal -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create Task</h3>
                <button class="close-modal" onclick="closeTaskModal()">&times;</button>
            </div>
            <form id="task-form">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="task-title">Title</label>
                        <input type="text" id="task-title" placeholder="Enter task title" required>
                    </div>
                    <div class="form-group">
                        <label for="task-description">Description</label>
                        <textarea id="task-description" rows="3" placeholder="Enter task description"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-priority">Priority</label>
                            <select id="task-priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="task-assignee">Assign to</label>
                            <select id="task-assignee">
                                <option value="">Unassigned</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="task-due-date">Due Date</label>
                        <input type="date" id="task-due-date">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Project Modal -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create Project</h3>
                <button class="close-modal" onclick="closeProjectModal()">&times;</button>
            </div>
            <form id="project-form">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="project-name">Project Name</label>
                        <input type="text" id="project-name" placeholder="Enter project name" required>
                    </div>
                    <div class="form-group">
                        <label for="project-description">Description</label>
                        <textarea id="project-description" rows="3" placeholder="Enter project description"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeProjectModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create Project</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Sprint Modal -->
    <div class="modal" id="sprint-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Start New Sprint</h3>
                <button class="close-modal" onclick="closeSprintModal()">&times;</button>
            </div>
            <form id="sprint-form">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="sprint-name">Sprint Name</label>
                        <input type="text" id="sprint-name" placeholder="e.g., Sprint 1 - Authentication" required>
                    </div>
                    <div class="form-group">
                        <label for="sprint-goal">Goal</label>
                        <textarea id="sprint-goal" rows="2" placeholder="What do you want to accomplish?"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sprint-start-date">Start Date</label>
                            <input type="date" id="sprint-start-date">
                        </div>
                        <div class="form-group">
                            <label for="sprint-end-date">End Date</label>
                            <input type="date" id="sprint-end-date">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeSprintModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Start Sprint</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Comment & Task Detail Modal -->
    <div class="modal" id="comment-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="comment-task-title">Task Details</h3>
                <button class="close-modal" onclick="closeCommentModal()">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Edit Task Form -->
                <div class="edit-task-section">
                    <h4><i class="fas fa-edit"></i> Edit Task</h4>
                    <input type="hidden" id="edit-task-id">
                    <div class="form-group">
                        <label for="edit-task-title">Title</label>
                        <input type="text" id="edit-task-title" placeholder="Task title">
                    </div>
                    <div class="form-group">
                        <label for="edit-task-description">Description</label>
                        <textarea id="edit-task-description" rows="2" placeholder="Task description"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-task-priority">Priority</label>
                            <select id="edit-task-priority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-task-assignee">Assignee</label>
                            <input type="text" id="edit-task-assignee" placeholder="Assignee name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-task-due-date">Due Date</label>
                            <input type="date" id="edit-task-due-date">
                        </div>
                        <div class="form-group">
                            <label for="edit-task-estimate">Est. Hours</label>
                            <input type="number" id="edit-task-estimate" min="0" step="0.5" value="0">
                        </div>
                    </div>
                    <div class="edit-task-actions">
                        <button class="btn-primary" id="save-task-btn">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <button class="btn-danger" id="delete-task-btn">
                            <i class="fas fa-trash"></i> Delete Task
                        </button>
                    </div>
                </div>
                
                <hr>
                
                <!-- Comments Section -->
                <h4><i class="fas fa-comments"></i> Comments</h4>
                <div id="comments-list" class="comments-list">
                    <!-- Comments will be loaded here -->
                </div>
                <div class="form-group">
                    <textarea id="new-comment" rows="2" placeholder="Write a comment..."></textarea>
                </div>
                <button class="btn-primary" id="add-comment-btn">Add Comment</button>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeCommentModal()">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
