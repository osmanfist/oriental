<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriental - Task Management Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="splash-page">
    <div class="splash-container">
        <div class="logo">
            <i class="fas fa-mountain-sun"></i>
        </div>
        <h1>oriental</h1>
        <p class="tagline">Task Management for Development Teams</p>
        <div class="loading-spinner"></div>
        <p class="redirect-text">Loading…</p>
    </div>

    <!-- Firebase (compat SDK — v9 only) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- firebase-config.js initialises the app and exposes `auth` globally -->
    <script src="js/firebase-config.js"></script>

    <script>
        /**
         * Entry point: check auth state and route to the correct page.
         * firebase-config.js has already initialised the app, so we use the
         * global `auth` reference it exports rather than calling initializeApp again.
         */
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('Signed in — redirecting to dashboard');
                window.location.href = 'dashboard.html';
            } else {
                console.log('Not signed in — redirecting to login');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
